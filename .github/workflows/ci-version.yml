name: CI and Version

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Build server
        run: npm run build:server

      - name: Run static contract tests
        run: |
          node tests/backend-auth-premium-static.test.mjs
          node tests/pdf-to-hwp-static.test.mjs
          node tests/pdf-to-docx-static.test.mjs
          node tests/admin-operations-static.test.mjs
          node tests/work-order-integration-static.test.mjs

      - name: Build HWP ingest exporter
        run: cargo build --manifest-path tools/rhwp-ingest-exporter/Cargo.toml --release

  bump-version:
    name: Bump patch version
    runs-on: ubuntu-latest
    needs: ci
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package patch version
        run: npm version patch --no-git-tag-version

      - name: Commit version bump
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "No version changes to commit."
            exit 0
          fi
          git add package.json package-lock.json
          git commit -m "chore: bump version [skip ci]"
          git push
