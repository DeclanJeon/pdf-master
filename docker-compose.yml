services:
  web:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      PORT: ${PORT:-3001}
      NODE_ENV: production

      # Runtime document-processing binaries (WORK-03, WORK-06)
      HWPFORGE_PATH: /app/bin/hwpforge
      SOFFICE_PATH: soffice
      HWPX2HTML_PATH: /app/server/hwpx2html.py
      MD2HTML_PATH: /app/scripts/md2html.py
      RHWP_PATH: rhwp
      RHWP_INGEST_EXPORTER_PATH: ${RHWP_INGEST_EXPORTER_PATH:-rhwp-ingest-exporter}
      PDFTOTEXT_PATH: pdftotext
      PDFTOHTML_PATH: pdftohtml
      PDFTOPPM_PATH: ${PDFTOPPM_PATH:-pdftoppm}
      QPDF_PATH: qpdf
      GHOSTSCRIPT_PATH: gs

      # Google OAuth/session config expected by WORK-01 server implementation
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://pdfm.ponslink.com}
      APP_URL: ${APP_URL:-https://pdfm.ponslink.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://pdfm.ponslink.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://pdfm.ponslink.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://pdfm.ponslink.com/api/auth/callback}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-pdfm_session}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-2592000000}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      AUTH_STORE_PATH: ${AUTH_STORE_PATH:-/app/data/auth-store.json}

      # Polar.sh checkout/webhook config expected by WORK-02/WORK-03 payment flow
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
      POLAR_ONE_TIME_PRODUCT_ID: ${POLAR_ONE_TIME_PRODUCT_ID:-3c5002d7-b5aa-4c8d-8fe4-433e8d46c239}
      POLAR_MONTHLY_PRODUCT_ID: ${POLAR_MONTHLY_PRODUCT_ID:-d7cd5993-4d33-46d9-8ba6-994c70b527f9}
      POLAR_CHECKOUT_CURRENCY: ${POLAR_CHECKOUT_CURRENCY:-krw}
      POLAR_ONE_TIME_CHECKOUT_URL: ${POLAR_ONE_TIME_CHECKOUT_URL:-https://buy.polar.sh/polar_cl_aGzorRvqZUgPJEt53EUCH6VZcuSyjV1hOrjBQ473ZZp}
      POLAR_MONTHLY_CHECKOUT_URL: ${POLAR_MONTHLY_CHECKOUT_URL:-https://buy.polar.sh/polar_cl_FFPmuDyi5Tp6g3NXSZWDenTjVJT2HYSN2UQu90uqaio}
      POLAR_CHECKOUT_SUCCESS_URL: ${POLAR_CHECKOUT_SUCCESS_URL:-https://pdfm.ponslink.com/pricing?success=true}
      POLAR_CHECKOUT_CANCEL_URL: ${POLAR_CHECKOUT_CANCEL_URL:-https://pdfm.ponslink.com/pricing?canceled=true}

      # Admin/operations config for WORK-14
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_AUDIT_LOG_PATH: ${ADMIN_AUDIT_LOG_PATH:-/app/data/admin-audit.log}
    volumes:
      - hwpforge-bin:/app/bin
      - pdfmaster-data:/app/data
    restart: unless-stopped

volumes:
  hwpforge-bin:
  pdfmaster-data:
